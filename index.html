<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mi rutina">
<title>Mi rutina</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #faf7f3; --bg2: #f2ede6; --card: #ffffff;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --text: #2c2420; --text2: #7a6f68; --text3: #b0a89f;
    --accent: #c4845a; --accent-l: #f5ede4; --accent-b: #e8cdb5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1714; --bg2: #231f1b; --card: #2a2521;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --text: #f0ebe5; --text2: #a09890; --text3: #60584f;
      --accent-l: #3a2518; --accent-b: #5a3520;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .app { max-width: 430px; margin: 0 auto; padding: 24px 16px 48px; }
  .top-date { font-size: 13px; color: var(--text2); margin-bottom: 2px; }
  .top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .top-title { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  .top-pct { font-size: 13px; color: var(--text2); font-weight: 500; }
  .bar-bg { height: 5px; background: var(--border); border-radius: 3px; margin-bottom: 5px; }
  .bar-fill { height: 5px; background: var(--accent); border-radius: 3px; transition: width 0.35s ease; }
  .bar-label { font-size: 12px; color: var(--text3); margin-bottom: 16px; }
  .done-banner { background: var(--accent-l); border: 0.5px solid var(--accent-b); border-radius: 12px; padding: 12px; text-align: center; margin-bottom: 14px; font-size: 14px; color: var(--accent); display: none; }
  .sync-status { font-size: 11px; color: var(--text3); text-align: right; margin-bottom: 10px; min-height: 16px; }
  .sync-status.syncing { color: var(--accent); }
  .sync-status.error { color: #c0392b; }
  .tabs { display: flex; gap: 6px; margin-bottom: 16px; }
  .tab { flex: 1; padding: 8px 4px; border-radius: 10px; border: 0.5px solid var(--border); background: transparent; font-size: 12px; color: var(--text2); cursor: pointer; text-align: center; font-family: inherit; transition: all 0.15s; }
  .tab.active { background: var(--accent-l); border-color: var(--accent-b); color: var(--accent); font-weight: 600; }
  .section { margin-bottom: 12px; border-radius: 14px; border: 0.5px solid var(--border); overflow: hidden; }
  .sec-hdr { padding: 11px 14px; display: flex; align-items: center; gap: 8px; }
  .sec-label { font-size: 13px; font-weight: 600; }
  .sec-time { margin-left: auto; font-size: 11px; opacity: 0.75; }
  .hdr-m  { background:#f5ede4; } .hdr-m  * { color:#7a4a2a; }
  .hdr-w  { background:#eaf0e8; } .hdr-w  * { color:#2e5026; }
  .hdr-g  { background:#e8f4f0; } .hdr-g  * { color:#1a5045; }
  .hdr-s  { background:#e8eaf5; } .hdr-s  * { color:#2c2f6b; }
  .hdr-n  { background:#f0e8f5; } .hdr-n  * { color:#4a1f6b; }
  .hdr-wk { background:#faeeda; } .hdr-wk * { color:#633806; }
  .items-list { background: var(--card); }
  .item { display: flex; align-items: center; gap: 12px; padding: 13px 14px; border-top: 0.5px solid var(--border); cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .item:active { background: var(--bg2); }
  .check { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .check svg { opacity: 0; transition: opacity 0.15s; }
  .item.done .check { background: var(--accent); border-color: var(--accent); }
  .item.done .check svg { opacity: 1; }
  .item.done .itext { color: var(--text3); text-decoration: line-through; }
  .itext { font-size: 14px; line-height: 1.4; flex: 1; }
  .opt { font-size: 10px; color: var(--text3); background: var(--bg2); border-radius: 8px; padding: 2px 7px; margin-left: 6px; vertical-align: middle; }
  .free-note { font-size: 13px; color: var(--text2); background: var(--bg2); border-radius: 12px; padding: 12px 14px; margin-bottom: 12px; line-height: 1.6; border: 0.5px solid var(--border); }
  .reset-btn { width: 100%; margin-top: 14px; padding: 12px; border-radius: 10px; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); font-size: 13px; cursor: pointer; font-family: inherit; }
  .reset-btn:active { background: var(--bg2); }
</style>
</head>
<body>
<div class="app">
  <div id="top-date" class="top-date"></div>
  <div class="top-row">
    <div class="top-title">Mi rutina</div>
    <div class="top-pct" id="top-pct"></div>
  </div>
  <div class="bar-bg"><div class="bar-fill" id="bar-fill" style="width:0%"></div></div>
  <div class="bar-label" id="bar-label"></div>
  <div class="sync-status" id="sync-status"></div>
  <div class="done-banner" id="done-banner">Rutina completa. Excelente día ✓</div>
  <div class="tabs">
    <button class="tab" onclick="setTab('cursada')" id="tab-cursada">Con cursada</button>
    <button class="tab" onclick="setTab('libre')" id="tab-libre">Día libre</button>
    <button class="tab" onclick="setTab('finde')" id="tab-finde">Finde</button>
  </div>
  <div id="checklist"></div>
  <button class="reset-btn" onclick="resetAll()">↺ Resetear checklist</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAewCTrR90xrtCDqsC-Ovk-B4poz5dTnfg",
  authDomain: "daily-checklist-35cf4.firebaseapp.com",
  projectId: "daily-checklist-35cf4",
  storageBucket: "daily-checklist-35cf4.firebasestorage.app",
  messagingSenderId: "555358057084",
  appId: "1:555358057084:web:e4e0bbffe0d99865374ff9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const DOC_ID = "florencia";

const DATA = {
  semana:[
    {id:'mo',label:'Morning',time:'7:00–8:00',cls:'m',icon:'🌅',items:[
      {id:'m1',text:'Levantarse, tender la cama'},
      {id:'m2',text:'Cara y dientes'},
      {id:'m3',text:'Páginas de libro',opt:true},
      {id:'m4',text:'Desayuno + 5 min journal'},
      {id:'m5',text:'Meditación 5–10 min'},
      {id:'m6',text:'Vestirse, ordenar el espacio'}]},
    {id:'wk',label:'Trabajo',time:'8:00–16:00',cls:'w',icon:'💻',items:[
      {id:'w1',text:'Mails + bloquear el día'},
      {id:'w2',text:'Treadmill desk encendida'},
      {id:'w3',text:'Almuerzo al escritorio (meal prep)'}]},
    {id:'gy',label:'Gym / pilates',time:'16:00–17:30',cls:'g',icon:'🏋️',items:[
      {id:'g1',text:'Sesión de gym o pilates'},
      {id:'g2',text:'Baño + skincare'}]}
  ],
  cursada:[
    {id:'cu',label:'Cursada',time:'19:00–22:00',cls:'s',icon:'📚',items:[
      {id:'c1',text:'Cena liviana (meal prep)'},
      {id:'c2',text:'Cursada online en treadmill desk'},
      {id:'c3',text:'Skincare nocturna'},
      {id:'c4',text:'5 min journal — cierre del día'}]}
  ],
  libre:[
    {id:'li',label:'Tarde libre',time:'17:30–22:30',cls:'n',icon:'⭐',items:[
      {id:'l1',text:'Estudio MSc / PMP (treadmill)',opt:true},
      {id:'l2',text:'Cena liviana (meal prep)'},
      {id:'l3',text:'Skincare nocturna'},
      {id:'l4',text:'5 min journal — cierre del día'},
      {id:'l5',text:'Lectura',opt:true},
      {id:'l6',text:'Meditación o respiraciones 5 min'}]}
  ],
  finde:[
    {id:'fb',label:'Base del día',cls:'m',icon:'🌅',items:[
      {id:'f1',text:'Levantarse, tender la cama'},
      {id:'f2',text:'Cara y dientes'},
      {id:'f3',text:'Desayuno tranquila'},
      {id:'f4',text:'5 min journal'},
      {id:'f5',text:'Meditación'}]},
    {id:'fg',label:'Gym / pilates',cls:'g',icon:'🏋️',items:[
      {id:'f6',text:'Sesión de gym o pilates'},
      {id:'f7',text:'Baño + skincare'}]},
    {id:'fp',label:'Proyectos y estudio',cls:'wk',icon:'✨',items:[
      {id:'f8',text:'Proyecto personal',opt:true},
      {id:'f9',text:'Estudio MSc / PMP',opt:true}]},
    {id:'fn',label:'Cierre del día',cls:'n',icon:'🌙',items:[
      {id:'f10',text:'Skincare nocturna'},
      {id:'f11',text:'5 min journal'},
      {id:'f12',text:'Meditación o respiraciones',opt:true}]}
  ]
};

let checked = {}, tab = 'cursada';
function today() { return new Date().toISOString().slice(0,10); }
function setSyncStatus(msg, cls='') {
  const el = document.getElementById('sync-status');
  el.textContent = msg; el.className = 'sync-status ' + cls;
}

async function load() {
  setSyncStatus('Cargando...', 'syncing');
  try {
    const ref = doc(db, 'rutina', DOC_ID);
    const snap = await getDoc(ref);
    if (snap.exists()) {
      const data = snap.data();
      checked = data.date === today() ? (data.checked || {}) : {};
      if (data.date !== today()) await saveRemote();
    }
    setSyncStatus('Sincronizado ✓');
    setTimeout(() => setSyncStatus(''), 2000);
  } catch(e) {
    setSyncStatus('Sin conexión — usando local', 'error');
    try { const r = localStorage.getItem('rutina_fallback'); if(r){const d=JSON.parse(r); checked=d.date===today()?(d.checked||{}):{}; } } catch(e2){}
  }
  const day = new Date().getDay();
  tab = (day===0||day===6) ? 'finde' : 'cursada';
  render();
}

async function saveRemote() {
  const payload = { date: today(), checked };
  try {
    await setDoc(doc(db, 'rutina', DOC_ID), payload);
    setSyncStatus('Sincronizado ✓');
    setTimeout(() => setSyncStatus(''), 2000);
  } catch(e) {
    setSyncStatus('Error al guardar', 'error');
  }
  try { localStorage.setItem('rutina_fallback', JSON.stringify(payload)); } catch(e) {}
}

async function toggle(id) { checked[id] = !checked[id]; render(); await saveRemote(); }
async function resetAll() { checked = {}; await saveRemote(); render(); }
function setTab(t) { tab = t; render(); }

function visible() {
  if (tab==='finde') return DATA.finde;
  return [...DATA.semana, ...(tab==='cursada' ? DATA.cursada : DATA.libre)];
}

function render() {
  const DAYS=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const MONTHS=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const now = new Date();
  document.getElementById('top-date').textContent = DAYS[now.getDay()] + ', ' + now.getDate() + ' ' + MONTHS[now.getMonth()];
  ['cursada','libre','finde'].forEach(t => document.getElementById('tab-'+t).classList.toggle('active', t===tab));

  const vis = visible();
  const all = vis.flatMap(s => s.items);
  const done = all.filter(i => checked[i.id]).length;
  const pct = all.length ? Math.round(done/all.length*100) : 0;

  document.getElementById('bar-fill').style.width = pct + '%';
  document.getElementById('bar-label').textContent = done + ' de ' + all.length + ' completadas';
  document.getElementById('top-pct').textContent = pct + '%';
  document.getElementById('done-banner').style.display = (done===all.length && all.length>0) ? 'block' : 'none';

  const cl = document.getElementById('checklist');
  cl.innerHTML = '';

  if (tab==='finde') {
    const note = document.createElement('div');
    note.className = 'free-note';
    note.textContent = 'Sin horarios fijos. Gym, proyectos, amigos, novio, peli — lo que tengas ganas. Lo que importa es el cierre del día.';
    cl.appendChild(note);
  }

  vis.forEach(sec => {
    const wrap = document.createElement('div'); wrap.className = 'section';
    const hdr = document.createElement('div'); hdr.className = 'sec-hdr hdr-'+sec.cls;
    hdr.innerHTML = '<span>'+sec.icon+'</span><span class="sec-label">'+sec.label+'</span>'+(sec.time?'<span class="sec-time">'+sec.time+'</span>':'');
    wrap.appendChild(hdr);
    const list = document.createElement('div'); list.className = 'items-list';
    sec.items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'item' + (checked[item.id] ? ' done' : '');
      row.onclick = () => toggle(item.id);
      row.innerHTML = '<div class="check"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="1.5,6 4.5,9 10.5,3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="itext">'+item.text+(item.opt?'<span class="opt">opcional</span>':'')+'</span>';
      list.appendChild(row);
    });
    wrap.appendChild(list); cl.appendChild(wrap);
  });
}

load();
</script>
</body>
</html>
